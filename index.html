<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lamyaa MARZOUQ - Portfolio</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111c38;
      --text: #e8eefc;
      --muted: #b8c3dd;
      --accent: #7c3aed;
      --accent-2: #06b6d4;
      --line: rgba(255, 255, 255, 0.12);
    }
    body.light {
      --bg: #f2f5ff;
      --panel: #ffffff;
      --text: #1a2340;
      --muted: #546287;
      --line: rgba(0, 0, 0, 0.1);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 78%, transparent);
    }

    .topbar-inner {
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .controls { display: flex; gap: 10px; align-items: center; }

    .chip {
      border: 1px solid var(--line);
      color: var(--text);
      background: color-mix(in srgb, var(--panel) 82%, transparent);
      border-radius: 999px;
      padding: 7px 12px;
      cursor: pointer;
    }

    .lang-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
    }

    .lang-switch .chip {
      border: 0;
      border-radius: 0;
      min-width: 46px;
    }

    .lang-switch .chip.active {
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      color: #fff;
    }

    #mobileMenu {
      display: none;
      border-top: 1px solid var(--line);
      padding: 10px 0 16px;
    }

    #mobileMenu.show { display: block; }

    #mobileMenu a {
      display: block;
      padding: 10px 0;
      text-decoration: none;
      color: var(--muted);
    }

    #mobileMenu a:hover { color: var(--text); }

    .hero {
      min-height: 70vh;
      display: grid;
      align-content: center;
      gap: 14px;
      padding: 56px 0;
    }

    .eyebrow { color: var(--accent); font-weight: 600; }
    h1 { margin: 0; font-size: clamp(36px, 7vw, 72px); line-height: 1.05; }
    h2 { font-size: clamp(28px, 5vw, 44px); margin: 0; }

    .subtitle { font-size: clamp(18px, 3vw, 28px); color: var(--muted); }
    .lead, .meta, .section-text { color: var(--muted); line-height: 1.75; text-align: left; }
    .section-text { max-width: 840px; margin-top: 14px; }

    .btns { display: flex; flex-wrap: wrap; gap: 12px; }

    .btn {
      border-radius: 999px;
      padding: 12px 18px;
      text-decoration: none;
      border: 1px solid transparent;
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      color: #fff;
    }

    .btn-secondary {
      border-color: var(--line);
      color: var(--text);
      background: transparent;
    }

    section.block { padding: 56px 0; border-top: 1px solid var(--line); }

    .grid { display: grid; gap: 16px; margin-top: 24px; }
    .projects { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .cols-2 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
      text-align: left;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: color-mix(in srgb, var(--accent) 60%, var(--line));
      box-shadow: 0 16px 36px rgba(0,0,0,.3);
    }

    .project-card { cursor: pointer; }

    .mockup {
      width: 100%;
      height: 160px;
      border-radius: 12px;
      margin-bottom: 12px;
      object-fit: cover;
      border: 1px solid var(--line);
    }

    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .tag {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .links { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
    .links a { color: var(--accent); }

    .contact-simple { text-align: center; padding: 28px; }
    .contact-email {
      display: inline-block;
      margin-top: 8px;
      font-size: 1.1rem;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--line);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .contact-icon-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      text-decoration: none;
      color: var(--text);
      background: color-mix(in srgb, var(--panel) 82%, transparent);
    }

    .contact-icon-link img { width: 20px; height: 20px; object-fit: contain; }

    .edu-item { display: flex; align-items: flex-start; gap: 12px; }
    .edu-logo {
      width: 48px;
      height: 48px;
      object-fit: contain;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      flex-shrink: 0;
    }

    .skill { margin-bottom: 12px; }
    .skill-top {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .bar { height: 9px; border-radius: 999px; background: rgba(255,255,255,.08); }
    .fill { height: 100%; border-radius: 999px; background: var(--accent); width: 0; transition: width 1s ease; }

    .project-detail {
      display: none;
      padding: 32px 0 56px;
      border-top: 1px solid var(--line);
    }

    .project-detail.show { display: block; }

    .detail-panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      padding: 22px;
    }

    .detail-header {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 16px;
    }

    .detail-header img {
      width: 84px;
      height: 84px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid var(--line);
    }
  </style>
</head>

        },

          title: "About",
          text: "I hold a degree in Marketing & Business Development and focus on AI applied to business. Through professional experiences and hands-on projects, I build practical solutions that connect strategy, data and digital tools."
        },
        projects: {
          title: "Projects",

          items: [

              description: "Marketing & Business Development.",

        },
        skills: {
          title: "Skills",
          categories: [
            { name: "Data", items: [["Python", 86], ["SQL", 84], ["Dataiku", 80], ["Tableau", 79]] },

    };

    let lang = "fr";
    let dark = true;

    const byPath = (obj, path) => path.split(".").reduce((acc, k) => acc && acc[k], obj);

    function renderText() {
      const t = content[lang];
      document.documentElement.lang = lang;
      document.querySelectorAll("[data-t]").forEach((el) => {
        const val = byPath(t, el.dataset.t);
        if (typeof val === "string") el.textContent = val;
      });

      renderProjects(t);
      renderEducation(t);
      renderSkills(t);

      document.getElementById("langFr").classList.toggle("active", lang === "fr");
      document.getElementById("langEn").classList.toggle("active", lang === "en");
    }

    function renderProjects(t) {
      const root = document.getElementById("projectsGrid");
      root.innerHTML = t.projects.items.map((p, index) => `
        <article class="card project-card" data-index="${index}">
          <img class="mockup" src="${p.image || ""}" alt="${p.title}" />
          <h3>${p.title}</h3>
          <p class="meta"><strong>${t.projects.shortLabel}:</strong> ${p.short || p.description}</p>
          <div class="tags">${p.stack.map((s) => `<span class="tag">${s}</span>`).join("")}</div>
          <div class="links">
            <a href="${p.github}" target="_blank" rel="noreferrer">GitHub</a>
            ${p.url ? `<a href="${p.url}" target="_blank" rel="noreferrer">Lien</a>` : ""}
            <span class="meta">${t.projects.viewDetails}</span>
          </div>
        </article>
      `).join("");

      root.querySelectorAll(".project-card").forEach((card) => {
        card.addEventListener("click", (event) => {
          if (event.target.tagName.toLowerCase() === "a") return;
          const idx = Number(card.dataset.index);
          openProjectDetail(t.projects.items[idx], t);
        });
      });
    }

    function openProjectDetail(project, t) {
      document.querySelector("main.container").style.display = "none";
      const section = document.getElementById("projectDetail");
      section.classList.add("show");
      document.getElementById("detailTitle").textContent = project.title;
      document.getElementById("detailDescription").textContent = project.description;
      document.getElementById("detailGoalLabel").textContent = `${t.projects.goal}:`;
      document.getElementById("detailGoal").textContent = project.goal;
      document.getElementById("detailFeaturesLabel").textContent = `${t.projects.features}:`;
      document.getElementById("detailFeatures").textContent = project.features;
      document.getElementById("detailImage").src = project.image || "";
      document.getElementById("detailImage").alt = project.title;
      document.getElementById("detailTags").innerHTML = project.stack.map((s) => `<span class="tag">${s}</span>`).join("");
      document.getElementById("detailLinks").innerHTML = `
        <a href="${project.github}" target="_blank" rel="noreferrer">GitHub</a>
        ${project.url ? `<a href="${project.url}" target="_blank" rel="noreferrer">Lien</a>` : ""}
      `;
    }

    function closeProjectDetail() {
      document.getElementById("projectDetail").classList.remove("show");
      document.querySelector("main.container").style.display = "block";
    }

    function renderEducation(t) {
      const root = document.getElementById("eduGrid");
      root.innerHTML = t.education.items.map((i) => `
        <article class="card">
          <div class="edu-item">
            ${i.logo ? `<img class="edu-logo" src="${i.logo}" alt="${i.org}" />` : ""}
            <div>
              <div class="meta">${i.date}</div>
              <h3>${i.name}</h3>
              <div class="meta">${i.org}</div>
              <p class="meta">${i.description}</p>
            </div>
          </div>
        </article>
      `).join("");
    }

    function renderSkills(t) {
      const root = document.getElementById("skillsGrid");
      root.innerHTML = t.skills.categories.map((c) => `
        <article class="card">
          <h3>${c.name}</h3>
          ${c.items.map(([name, level]) => `
            <div class="skill">
              <div class="skill-top"><span>${name}</span><span>${level}%</span></div>
              <div class="bar"><div class="fill" data-level="${level}"></div></div>
            </div>
          `).join("")}
        </article>
      `).join("");

      requestAnimationFrame(() => {
        document.querySelectorAll(".fill").forEach((el) => {
          el.style.width = el.dataset.level + "%";
        });
      });
    }

    document.getElementById("langFr").addEventListener("click", () => { lang = "fr"; renderText(); });
    document.getElementById("langEn").addEventListener("click", () => { lang = "en"; renderText(); });

    document.getElementById("themeBtn").addEventListener("click", () => {
      dark = !dark;
      document.body.classList.toggle("light", !dark);
      document.getElementById("themeBtn").textContent = dark ? "Light" : "Dark";
    });

    document.getElementById("burgerBtn").addEventListener("click", () => {
      document.getElementById("mobileMenu").classList.toggle("show");
    });

    document.querySelectorAll("#mobileMenu a").forEach((a) => {
      a.addEventListener("click", () => document.getElementById("mobileMenu").classList.remove("show"));
    });

    document.getElementById("backProjectBtn").addEventListener("click", closeProjectDetail);

    renderText();
  </script>
</body>
</html>
